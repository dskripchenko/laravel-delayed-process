name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        laravel: ['11', '12', '13']
        exclude:
          - php: '8.2'
            laravel: '13'
        include:
          - laravel: '11'
            testbench: '^9.0'
          - laravel: '12'
            testbench: '^10.0'
          - laravel: '13'
            testbench: '^11.0'
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, sqlite3
          coverage: none
      - name: Pin Testbench
        run: composer require "orchestra/testbench:${{ matrix.testbench }}" --dev --no-update --no-interaction
      - name: Allow EOL framework resolution (Laravel 11 only)
        if: matrix.laravel == '11'
        run: composer config policy.advisories.block false
      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress
      - name: Pest
        run: vendor/bin/pest
